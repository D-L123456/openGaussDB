<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>ER Reference</title></head>
<body style="margin:0;padding:20px;background:white;font-family:sans-serif">
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker></defs>
  <line x1="200" y1="200" x2="280" y2="200" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="240" y="190" text-anchor="middle" fill="#64748b" font-size="12">使用</text>
  <text x="240" y="218" text-anchor="middle" fill="#94a3b8" font-size="10">1:N</text>
  <line x1="620" y1="200" x2="700" y2="200" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="660" y="190" text-anchor="middle" fill="#64748b" font-size="12">属于</text>
  <text x="660" y="218" text-anchor="middle" fill="#94a3b8" font-size="10">N:1</text>
  <line x1="450" y1="280" x2="450" y2="330" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="475" y="310" fill="#64748b" font-size="12">记录</text>
  <text x="475" y="326" fill="#94a3b8" font-size="10">1:N</text>

  <g transform="translate(110,200)">
    <rect x="-90" y="-70" width="180" height="140" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <rect x="-90" y="-70" width="180" height="28" rx="6" fill="#3b82f6"/><rect x="-90" y="-48" width="180" height="6" fill="#3b82f6"/>
    <text x="0" y="-50" text-anchor="middle" fill="white" font-size="13" font-weight="600">客户</text>
    <text x="-78" y="-28" fill="#dc2626" font-size="11" font-weight="700"># 客户编号 (Serial)</text>
    <text x="-78" y="-12" fill="#374151" font-size="11">客户姓名 (Characters(8))</text>
    <text x="-78" y="4" fill="#374151" font-size="11">手机号码 (Characters(18))</text>
    <text x="-78" y="20" fill="#374151" font-size="11">联系电话 (Characters(20))</text>
    <text x="-78" y="36" fill="#374151" font-size="11">联系地址 (Varchar(50))</text>
  </g>

  <g transform="translate(450,200)">
    <rect x="-110" y="-84" width="220" height="168" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>

    <text x="-98" y="-26" fill="#dc2626" font-size="11" font-weight="700"># 存款类型 (Integer)</text>
    <text x="-98" y="-10" fill="#374151" font-size="11">卡号 (Varchar(10))</text>
    <text x="-98" y="6" fill="#374151" font-size="11">开卡时间 (Timestamp)</text>
    <text x="-98" y="22" fill="#374151" font-size="11">账户余额 (Decimal(18,2))</text>
    <text x="-98" y="38" fill="#374151" font-size="11">额度限制 (Characters(8))</text>
    <text x="-98" y="54" fill="#374151" font-size="11">是否挂失 (Varchar(5))</text>
  </g>

  <g transform="translate(790,200)">
    <rect x="-90" y="-54" width="180" height="108" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <rect x="-90" y="-54" width="180" height="28" rx="6" fill="#3b82f6"/><rect x="-90" y="-32" width="180" height="6" fill="#3b82f6"/>
    <text x="0" y="-34" text-anchor="middle" fill="white" font-size="13" font-weight="600">存款类型</text>
    <text x="-78" y="-12" fill="#dc2626" font-size="11" font-weight="700"># 存款类型 (Serial)</text>
    <text x="-78" y="4" fill="#374151" font-size="11">存款名称 (Varchar(20))</text>
    <text x="-78" y="20" fill="#374151" font-size="11">存款描述 (Varchar(50))</text>
  </g>

  <g transform="translate(450,400)">
    <rect x="-110" y="-54" width="220" height="108" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>

    <text x="0" y="-34" text-anchor="middle" fill="white" font-size="13" font-weight="600">交易信息</text>
    <text x="-98" y="-12" fill="#dc2626" font-size="11" font-weight="700"># 交易类型 (Characters(6))</text>
    <text x="-98" y="4" fill="#dc2626" font-size="11" font-weight="700"># 卡号 (Characters(17))</text>
    <text x="-98" y="20" fill="#374151" font-size="11">交易时间 (Timestamp)</text>
    <text x="-98" y="36" fill="#374151" font-size="11">交易金额 (Decimal(18,2))</text>
  </g>

</body></html>
