<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>API测试</title>
<style>
body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
#log { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; min-height: 200px; }
button { padding: 8px 20px; margin: 8px 4px; cursor: pointer; }
input { padding: 8px; width: 400px; }
.ok { color: #10b981; }
.err { color: #ef4444; }
</style>
</head>
<body>
<h2>OpenGauss 智能体 API 测试</h2>
<div>
  <input id="msg" value="openGauss如何安装" placeholder="输入问题" />
  <button onclick="testAsk()">发送测试</button>
  <button onclick="testHealth()">健康检查</button>
  <button onclick="testSessions()">会话列表</button>
</div>
<div id="log"></div>
<script>
const log = document.getElementById('log');
function addLog(msg, cls) {
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function testHealth() {
  addLog('>>> GET /api/health');
  try {
    const r = await fetch('/api/health');
    const data = await r.json();
    addLog('<<< ' + r.status + ' ' + JSON.stringify(data), r.ok ? 'ok' : 'err');
  } catch(e) {
    addLog('!!! ERROR: ' + e.message, 'err');
  }
}

async function testSessions() {
  addLog('>>> GET /api/chat/sessions');
  try {
    const r = await fetch('/api/chat/sessions');
    const data = await r.json();
    addLog('<<< ' + r.status + ' sessions: ' + data.length, r.ok ? 'ok' : 'err');
  } catch(e) {
    addLog('!!! ERROR: ' + e.message, 'err');
  }
}

async function testAsk() {
  const msg = document.getElementById('msg').value;
  addLog('>>> POST /api/chat/ask: ' + msg);
  try {
    const r = await fetch('/api/chat/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg}),
    });
    const data = await r.json();
    addLog('<<< ' + r.status + ' answer: ' + data.answer.substring(0, 200) + '...', r.ok ? 'ok' : 'err');
    addLog('    sources: ' + JSON.stringify(data.sources));
  } catch(e) {
    addLog('!!! ERROR: ' + e.message, 'err');
  }
}

addLog('页面加载完成，点击按钮测试API');
testHealth();
</script>
</body>
</html>
